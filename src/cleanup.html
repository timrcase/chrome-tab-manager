<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Manager — Cleanup</title>
  <link rel="stylesheet" href="cleanup.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Tab <span>Manager</span></h1>
    <div class="header-actions">
      <span class="app-section">Cleanup</span>
      <button class="options-link" id="openOptions">⚙ Options</button>
    </div>
  </header>

  <div class="app">

    <div id="loadingState" class="loading-state">Scanning open tabs…</div>

    <div id="mainContent" style="display:none">

      <div class="summary-bar" id="summaryBar"></div>

      <!-- Duplicate tabs -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <span class="count-badge" id="dupCount"></span>
            Duplicate Tabs
            <span class="material-symbols-outlined info-icon" data-tooltip="Multiple tabs open to the same URL. Most recently accessed will be kept.">info</span>
          </div>
        </div>
        <div class="card-toolbar">
          <div class="card-actions">
            <button class="btn btn-danger btn-sm" id="dupCloseExtras" disabled>Close extras</button>
          </div>
        </div>
        <div id="dupList"></div>
        <div class="empty-state" id="dupEmpty" style="display:none">No duplicate tabs.</div>
      </div>

      <!-- Stale tabs -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <span class="count-badge" id="staleCount"></span>
            Stale Tabs
            <span class="material-symbols-outlined info-icon" id="staleInfoIcon" data-tooltip=""></span>
          </div>
        </div>
        <div class="card-toolbar stale-toolbar" id="staleActions">
          <label class="stale-threshold-control" for="cleanupStaleThresholdDays">
            <span class="stale-threshold-label">inactive &gt;</span>
            <input type="range" id="cleanupStaleThresholdDays" min="0" max="360" step="15" />
            <output id="cleanupStaleThresholdValue" for="cleanupStaleThresholdDays">15d</output>
          </label>
          <div class="card-actions">
            <button class="btn btn-ghost btn-sm" id="staleSelectAll">Select all</button>
            <button class="btn btn-ghost btn-sm" id="staleSaveSelected" disabled>Save selected</button>
            <button class="btn btn-danger btn-sm" id="staleCloseSelected" disabled>Close selected</button>
          </div>
        </div>
        <div id="staleList" class="item-list"></div>
        <div class="empty-state" id="staleEmpty" style="display:none"></div>
      </div>

      <p class="footer-note">Tabs closed here are not added to the archive.</p>

    </div>
  </div>

  <script src="cleanup.js"></script>
</body>
</html>
