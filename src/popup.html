<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Save Tab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="preview-strip" id="spPreview">
    <div id="spFavicon"></div>
    <div class="preview-meta">
      <div class="preview-title" id="spTitle"></div>
      <div class="preview-url" id="spUrl"></div>
    </div>
  </div>

  <div class="unsaveable" id="spUnsaveable" style="display:none">
    This page can't be saved.
  </div>

  <div id="spForm" style="display:none">
    <div class="form-body">
      <span class="form-label">Tags</span>
      <div class="tag-area" id="spTagArea">
        <input type="text" class="tag-input" id="spTagInput"
               placeholder="add tags…" maxlength="30"
               autocomplete="off" autocorrect="off" spellcheck="false" />
      </div>
    </div>
    <footer class="popup-footer">
      <button class="btn-ghost" id="spViewBtn">Open Tab Manager ↗</button>
      <button class="btn-primary" id="spSaveBtn">Save</button>
    </footer>
    <div class="error-msg" id="spError" style="display:none"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
