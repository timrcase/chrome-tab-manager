<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Manager</title>
  <link rel="stylesheet" href="manager.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Tab <span>Manager</span></h1>
    <div class="header-actions">
      <button class="options-link" id="openOptions">⚙ Options</button>
    </div>
  </header>

  <div class="app">
    <!-- Left nav -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="open">
        Open <span class="tab-badge" id="openCount">0</span>
      </button>
      <button class="tab-btn" data-tab="saved">
        Saved <span class="tab-badge" id="savedCount">0</span>
      </button>
      <button class="tab-btn" data-tab="archive">
        Archive <span class="tab-badge" id="archiveCount">0</span>
      </button>
      <button class="tab-btn" data-tab="backup">
        Backup <span class="tab-badge" id="backupCount">0</span>
      </button>
    </nav>

    <div class="app-content">

    <!-- Saved tabs section -->
    <section class="section active" id="section-saved">
      <div class="section-header">
        <span class="section-title">Saved Tabs</span>
        <div class="section-header-actions">
          <button class="btn btn-danger btn-sm" id="clearSavedTabs">Clear all</button>
        </div>
      </div>

      <!-- Tag filter chips -->
      <div class="tag-filter-area" id="tagFilterArea" style="display:none">
        <span class="tag-filter-label">Filter:</span>
        <div id="tagChips"></div>
        <button class="btn btn-ghost btn-sm" id="clearTagFilter" style="visibility:hidden">Clear filters</button>
      </div>

      <div id="savedList" class="item-list">
        <div class="empty-state">No saved tabs yet.<br>Click the extension icon to save a tab.</div>
      </div>
    </section>

    <!-- Open tabs section -->
    <section class="section" id="section-open">
      <div class="section-header">
        <span class="section-title">Open Tabs</span>
        <button class="btn btn-secondary btn-sm" id="refreshOpenTabs">
          <svg class="ui-icon" aria-hidden="true"><use href="icons/ui-icons.svg#refresh"></use></svg>
          Refresh
        </button>
      </div>
      <div class="ot-toolbar">
        <div class="ot-filters" id="otFilters">
          <button class="ot-filter active" data-filter="all">All <span id="otCountAll">0</span></button>
          <button class="ot-filter" data-filter="dupes">Duplicates <span id="otCountDupes">0</span></button>
        </div>
        <input type="search" class="inline-input ot-search" id="otSearch" placeholder="Filter title or URL…" />
      </div>
      <div class="ot-bulk" id="otBulk">
        <span class="ot-bulk-count" id="otSelCount">0 selected</span>
        <button class="btn btn-primary btn-sm" id="otBulkSave">Save &amp; close</button>
        <button class="btn btn-ghost btn-sm" id="otBulkClose">Close</button>
        <button class="btn btn-ghost btn-sm" id="otBulkDeselect">Deselect all</button>
      </div>
      <div class="ot-table-wrap">
        <table class="ot-table">
          <colgroup>
            <col class="ot-col-chk" />
            <col class="ot-col-pos" />
            <col class="ot-col-fav" />
            <col class="ot-col-title" />
            <col class="ot-col-group" />
            <col class="ot-col-domain" />
            <col class="ot-col-accessed" />
            <col class="ot-col-actions" />
          </colgroup>
          <thead>
            <tr>
              <th></th>
              <th class="ot-sortable ot-th-pos" data-col="index"># <span class="ot-sort-icon"></span></th>
              <th></th>
              <th class="ot-sortable" data-col="title">Title <span class="ot-sort-icon"></span></th>
              <th class="ot-sortable" data-col="group">Group <span class="ot-sort-icon"></span></th>
              <th class="ot-sortable" data-col="domain">Domain <span class="ot-sort-icon"></span></th>
              <th class="ot-sortable" data-col="lastAccessed">Last Accessed <span class="ot-sort-icon"></span></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="otBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Backup section -->
    <section class="section" id="section-backup">
      <div class="section-header">
        <span class="section-title">Tab Backups</span>
        <div class="section-header-actions">
          <button class="btn btn-secondary btn-sm" id="runBackupNow">Backup now</button>
          <button class="btn btn-danger btn-sm" id="clearBackupList">Clear all</button>
        </div>
      </div>
      <div id="backupList">
        <div class="empty-state">No backups yet.<br>Configure backup interval in Options.</div>
      </div>
    </section>

    <!-- Archive section -->
    <section class="section" id="section-archive">
      <div class="section-header">
        <span class="section-title">Stale Tab Archive</span>
        <div class="section-header-actions">
          <button class="btn btn-danger btn-sm" id="clearArchive">Clear all</button>
        </div>
      </div>
      <input type="search" class="inline-input archive-search" id="archiveSearch" placeholder="Search title or URL…" />
      <p class="archive-purge-note" id="archivePurgeNote"></p>
      <div id="archiveList" class="item-list">
        <div class="empty-state">No archived tabs.</div>
      </div>
    </section>

    </div><!-- .app-content -->
  </div>

  <script src="manager.js"></script>
</body>
</html>
